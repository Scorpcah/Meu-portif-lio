<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
      <style>
        /* O CSS fica aqui dentro do <style> */
        .caixa-quadrada {
            width: 300px;           /* Largura */
            height: 300px;          /* Altura igual para ser quadrado */
            background-color: gold; /* Cor do fundo */
            border: 5px solid black;/* Borda: largura, estilo e cor */
            
            /* Centraliza o conteúdo dentro do quadrado */
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>teste</h1>
    <div class="caixa-quadrada">
        CONTEÚDO AQUI
    </div>
</body>
</html>
